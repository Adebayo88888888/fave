<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You | April 20</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">
</head>

<body>

    <div id="countdown-screen" class="full-screen">
        <h2 class="poetic-text">Something special is arriving...</h2>
        <div id="timer">00d 00h 00m 00s</div>
    </div>

    <div id="birthday-content" class="hidden">
        <section class="hero">
            <div class="hero-text">
                <h1 class="fade-in">Happy Birthday, Beautiful</h1>
                <p class="fade-in-delay">Distance is just a number; today is all about you.</p>
            </div>
        </section>

        <section class="poetry-section">
            <p class="quote">"In every coordinate of my life, you are the constant."</p>
        </section>

        <section class="gallery">
            <div class="photo-frame"><img src="assets/gallery1.jpg" alt="Moment 1"></div>
            <div class="photo-frame"><img src="assets/gallery2.jpg" alt="Moment 2"></div>
            <div class="photo-frame"><img src="assets/hero.jpg" alt="Moment 3"></div>
        </section>

        <footer>
            <p>Made with ❤️ from [Your Name]</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
